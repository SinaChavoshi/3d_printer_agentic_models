<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Printer Agentic Studio - AI CAD Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; display: flex; }
    
    /* Left Sidebar Panel */
    #sidebar { width: 420px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; height: 100vh; z-index: 10; }
    .header { padding: 18px; background: #0f172a; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.15rem; font-weight: 700; color: #38bdf8; display: flex; align-items: center; gap: 8px; }
    
    .panel-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; }
    
    label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; display: block; margin-bottom: 6px; }
    select, input, textarea { width: 100%; background: #0f172a; border: 1px solid #475569; color: #f8fafc; border-radius: 8px; padding: 10px 12px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    select:focus, textarea:focus, input:focus { border-color: #38bdf8; }
    
    textarea { height: 90px; resize: vertical; font-family: inherit; }
    
    .btn { background: #0284c7; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
    .btn:hover { background: #0369a1; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    
    .btn-secondary { background: #334155; border: 1px solid #475569; }
    .btn-secondary:hover { background: #475569; }
    
    .settings-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    
    .stats-card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.82rem; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-val { font-weight: 700; color: #38bdf8; font-size: 0.95rem; margin-top: 2px; }
    
    .code-container { background: #090d16; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-family: 'Fira Code', monospace; font-size: 0.78rem; max-height: 200px; overflow: auto; white-space: pre-wrap; color: #a5f3fc; }
    
    /* 3D Viewport Right Panel */
    #viewport-container { flex: 1; position: relative; height: 100vh; background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%); }
    #canvas3d { width: 100%; height: 100%; display: block; }
    
    .view-overlay { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
    .overlay-btn { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }
    .overlay-btn:hover { background: #38bdf8; color: #0f172a; font-weight: 600; }
    
    .loading-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 20; }
    .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Left Sidebar -->
  <div id="sidebar">
    <div class="header">
      <h1>🧊 3D Agent Studio</h1>
      <button class="overlay-btn" onclick="toggleSettings()">⚙️ Settings</button>
    </div>

    <div class="panel-body">
      <!-- Settings Panel (Collapsible) -->
      <div id="settings-panel" class="settings-box" style="display: none;">
        <label>Provider & API Key Configuration</label>
        <div>
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="google">Google Gemini (Vertex AI / Key)</option>
            <option value="openai">OpenAI / Compatible API</option>
            <option value="self-hosted">Self-Hosted / Local LLM (Ollama, vLLM)</option>
          </select>
        </div>
        <div>
          <label for="api-key-input">API Key (Optional)</label>
          <input type="password" id="api-key-input" placeholder="Paste your API key here...">
        </div>
        <div>
          <label for="base-url-input">Custom Base URL (For Self-Hosted / Local LLM)</label>
          <input type="text" id="base-url-input" placeholder="e.g. http://localhost:11434/v1">
        </div>
      </div>

      <div>
        <label for="model-select">Select AI Model</label>
        <select id="model-select">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast & Recommended)</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro (Complex CAD & High Precision)</option>
          <option value="gpt-4o">OpenAI GPT-4o</option>
          <option value="qwen2.5-coder">Qwen 2.5 Coder (Self-Hosted / Local)</option>
        </select>
      </div>

      <div>
        <label for="prompt-input">3D Model Description / Modification</label>
        <textarea id="prompt-input" placeholder="e.g. Create a 3D printable hollow cylinder vase with twisted ridges..."></textarea>
      </div>

      <button id="generate-btn" class="btn">
        <span>✨ Generate 3D Model</span>
      </button>

      <!-- 3D Print Stats -->
      <div>
        <label>3D Print Specifications</label>
        <div class="stats-card">
          <div class="stat-item">
            <span>Bounding Box (mm)</span>
            <span id="stat-bbox" class="stat-val">25 x 25 x 25</span>
          </div>
          <div class="stat-item">
            <span>Volume (mm³)</span>
            <span id="stat-volume" class="stat-val">15,625</span>
          </div>
          <div class="stat-item">
            <span>Triangle Mesh</span>
            <span id="stat-faces" class="stat-val">12 faces</span>
          </div>
          <div class="stat-item">
            <span>3D Printable Status</span>
            <span id="stat-printable" class="stat-val" style="color: #4ade80;">Watertight</span>
          </div>
        </div>
      </div>

      <!-- Export STL Button -->
      <button id="export-stl-btn" class="btn btn-secondary">
        📥 Download STL for 3D Printing
      </button>

      <!-- Generated Python Code View -->
      <div>
        <label>Generated Python (Trimesh Code)</label>
        <div id="code-view" class="code-container"># Python code generated by AI will appear here...</div>
      </div>
    </div>
  </div>

  <!-- Right 3D Viewport -->
  <div id="viewport-container">
    <canvas id="canvas3d"></canvas>

    <div class="view-overlay">
      <button class="overlay-btn" onclick="resetCamera()">Reset View</button>
      <button class="overlay-btn" onclick="toggleWireframe()">Toggle Wireframe</button>
    </div>

    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-status" style="font-weight: 600; color: #38bdf8;">Querying AI Engine...</div>
    </div>
  </div>

  <script>
    let scene, camera, renderer, controls, currentMesh, isWireframe = false;
    let currentSessionId = null, currentCode = "";

    function toggleSettings() {
      const p = document.getElementById('settings-panel');
      p.style.display = p.style.display === 'none' ? 'flex' : 'none';
    }

    function init3D() {
      const container = document.getElementById('viewport-container');
      scene = new THREE.Scene();
      
      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(60, 60, 80);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight1.position.set(100, 100, 50);
      scene.add(dirLight1);

      const dirLight2 = new THREE.DirectionalLight(0x38bdf8, 0.4);
      dirLight2.position.set(-100, -50, -50);
      scene.add(dirLight2);

      // Grid Floor
      const grid = new THREE.GridHelper(200, 40, 0x38bdf8, 0x334155);
      grid.position.y = -0.1;
      scene.add(grid);

      window.addEventListener('resize', onWindowResize);
      animate();

      createSampleCube();
    }

    function createSampleCube() {
      if (currentMesh) scene.remove(currentMesh);
      const geometry = new THREE.BoxGeometry(25, 25, 25);
      const material = new THREE.MeshStandardMaterial({ color: 0x38bdf8, metalness: 0.2, roughness: 0.4 });
      currentMesh = new THREE.Mesh(geometry, material);
      scene.add(currentMesh);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      const container = document.getElementById('viewport-container');
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function resetCamera() {
      camera.position.set(60, 60, 80);
      controls.target.set(0, 0, 0);
    }

    function toggleWireframe() {
      if (currentMesh) {
        isWireframe = !isWireframe;
        currentMesh.traverse((child) => {
          if (child.isMesh) child.material.wireframe = isWireframe;
        });
      }
    }

    function renderOBJString(objData) {
      if (currentMesh) scene.remove(currentMesh);
      
      const loader = new THREE.OBJLoader();
      currentMesh = loader.parse(objData);
      
      const material = new THREE.MeshStandardMaterial({
        color: 0x38bdf8,
        metalness: 0.2,
        roughness: 0.4,
        wireframe: isWireframe
      });

      currentMesh.traverse((child) => {
        if (child.isMesh) child.material = material;
      });

      // Center geometry
      const box = new THREE.Box3().setFromObject(currentMesh);
      const center = box.getCenter(new THREE.Vector3());
      currentMesh.position.sub(center);

      scene.add(currentMesh);
    }

    async function generate3DModel(promptText) {
      const loading = document.getElementById('loading');
      const statusText = document.getElementById('loading-status');
      const genBtn = document.getElementById('generate-btn');
      
      statusText.textContent = "Querying AI Model & Rendering Geometry...";
      loading.style.display = 'flex';
      genBtn.disabled = true;

      try {
        const payload = {
          prompt: promptText,
          current_code: currentCode,
          model_name: document.getElementById('model-select').value,
          provider: document.getElementById('provider-select').value,
          api_key: document.getElementById('api-key-input').value.trim() || null,
          base_url: document.getElementById('base-url-input').value.trim() || null
        };

        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Generation failed');

        currentSessionId = data.session_id;
        currentCode = data.code;
        document.getElementById('code-view').textContent = data.code;

        renderOBJString(data.obj_data);

        const stats = data.stats;
        document.getElementById('stat-bbox').textContent = `${stats.bounding_box_mm[0]} x ${stats.bounding_box_mm[1]} x ${stats.bounding_box_mm[2]}`;
        document.getElementById('stat-volume').textContent = `${stats.volume_mm3}`;
        document.getElementById('stat-faces').textContent = `${stats.faces_count} faces (${stats.vertices_count} verts)`;
        document.getElementById('stat-printable').textContent = stats.is_printable ? 'Watertight (Ready)' : 'Non-watertight';
        document.getElementById('stat-printable').style.color = stats.is_printable ? '#4ade80' : '#f87171';

        document.getElementById('export-stl-btn').disabled = false;
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        loading.style.display = 'none';
        genBtn.disabled = false;
      }
    }

    document.getElementById('generate-btn').addEventListener('click', () => {
      const prompt = document.getElementById('prompt-input').value.trim();
      if (prompt) generate3DModel(prompt);
      else alert('Please enter a description for the 3D model.');
    });

    document.getElementById('export-stl-btn').addEventListener('click', () => {
      if (currentSessionId) {
        window.location.href = `/api/export/${currentSessionId}/stl`;
      } else {
        alert('Please generate a 3D model first.');
      }
    });

    window.onload = init3D;
  </script>
</body>
</html>
